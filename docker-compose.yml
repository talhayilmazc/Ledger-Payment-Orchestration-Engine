services:
  postgres:
    image: postgres:16
    container_name: ledger-postgres
    environment:
      - POSTGRES_DB=ledger
      - POSTGRES_USER=ledger
      - POSTGRES_PASSWORD=ledger
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ledger -d ledger"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - ledger-network

  redis:
    image: redis:7-alpine
    container_name: ledger-redis
    ports:
      - "6382:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ledger-network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: ledger-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - ledger-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: ledger-kafka
    ports:
      - "9094:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    depends_on:
      - zookeeper
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ledger-network

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: ledger-kafka-ui
    ports:
      - "8092:8080"
    environment:
      - KAFKA_CLUSTERS_0_NAME=ledger
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=kafka:9092
    depends_on:
      - kafka
    networks:
      - ledger-network

  api:
    build:
      context: .
    container_name: ledger-api
    ports:
      - "9300:9300"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/ledger
      - SPRING_DATASOURCE_USERNAME=ledger
      - SPRING_DATASOURCE_PASSWORD=ledger
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - ledger-network

volumes:
  postgres-data:
  redis-data:

networks:
  ledger-network:
    driver: bridge