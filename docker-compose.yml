services:
  postgres:
    image: postgres:16
    environment:
      - POSTGRES_DB=ledger
      - POSTGRES_USER=ledger
      - POSTGRES_PASSWORD=ledger
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ledger -d ledger"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build:
      context: .
    ports:
      - "9300:9300"
    depends_on:
      postgres:
        condition: service_healthy
